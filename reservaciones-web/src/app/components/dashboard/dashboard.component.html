<div class="dashboard-container">
  <nav class="sidebar">
    <img src="assets/logo.png" alt="Logo TECAir" class="logo" />
    <h2>Reservaciones</h2>
    <ul>
      <li *ngFor="let item of menu" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">
        <a [routerLink]="['/', item.valor]">{{ item.nombre }}</a>
      </li>
    </ul>
  </nav>

  <main class="main-content">
    <h1>{{ seccionActual }}</h1>
    <router-outlet />
  </main>
</div>
