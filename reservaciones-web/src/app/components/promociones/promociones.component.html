<div class="promociones-dashboard">
  <h3>Promociones disponibles</h3>

  <p *ngIf="error" class="error">{{ error }}</p>

  <div *ngIf="promociones.length === 0 && !error" class="placeholder">
    Actualmente no hay promociones registradas.
  </div>

  <div class="promociones-grid" *ngIf="promociones.length > 0">
    <div class="promo-card" *ngFor="let promo of promociones">
      <div class="promo-ruta">
        <span class="promo-ciudad">{{ promo.origen }}</span>
        <span class="promo-flecha">→</span>
        <span class="promo-ciudad">{{ promo.destino }}</span>
      </div>
      <div class="promo-descuento">{{ promo.descuento }}% de descuento</div>
      <div class="promo-periodo">
        Válido del {{ promo.fechaInicio | date:'dd/MM/yyyy' }} al {{ promo.fechaFin | date:'dd/MM/yyyy' }}
      </div>
    </div>
  </div>
</div>
