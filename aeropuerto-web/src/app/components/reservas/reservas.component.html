<div class="reservas-dashboard">
  <!-- Tabla de reservas -->
  <div class="reservas-table">
    <h3>Lista de reservas</h3>
    <div *ngIf="reservas.length === 0" class="placeholder">
      No hay reservas registradas
    </div>
    <table *ngIf="reservas.length > 0">
      <tr>
        <th>Usuario ID</th>
        <th>Vuelo ID</th>
        <th>Fecha Reserva</th>
        <th>Asientos</th>
        <th>Estado Pago</th>
        <th>Acciones</th>
      </tr>
      <tr *ngFor="let r of reservas">
        <td>{{r.usuarioId}}</td>
        <td>{{r.vueloId}}</td>
        <td>{{r.fechaReserva | date:'short'}}</td>
        <td>{{r.asientosReservados}}</td>
        <td>{{r.estadoPago}}</td>
        <td><button (click)="eliminarReserva(r.reservaId!)">Eliminar</button></td>
      </tr>
    </table>
  </div>

  <!-- Formulario de nueva reserva -->
  <div class="reservas-form">
    <h3>Agregar nueva reserva</h3>
    <form (ngSubmit)="agregarReserva()">
      <label>Usuario ID</label>
      <input type="number" [(ngModel)]="nuevaReserva.usuarioId" name="usuarioId" required />

      <label>Vuelo ID</label>
      <input type="number" [(ngModel)]="nuevaReserva.vueloId" name="vueloId" required />

      <label>Fecha Reserva</label>
      <input type="datetime-local" [(ngModel)]="nuevaReserva.fechaReserva" name="fechaReserva" required />

      <label>Asientos Reservados</label>
      <input type="number" [(ngModel)]="nuevaReserva.asientosReservados" name="asientosReservados" min="1" required />

      <label>Estado de Pago</label>
      <input type="text" [(ngModel)]="nuevaReserva.estadoPago" name="estadoPago" required />

      <button type="submit">Agregar Reserva</button>
    </form>
  </div>
</div>
