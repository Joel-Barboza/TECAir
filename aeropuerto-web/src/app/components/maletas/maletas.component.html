<div class="maletas-dashboard">
  <!-- Tabla de maletas -->
  <div class="maletas-table">
    <div class="table-header">
      <h3>Lista de maletas</h3>
      <button type="button" class="btn-refresh" (click)="cargarMaletas()">&#8635; Actualizar</button>
    </div>

    <p class="success" *ngIf="mensaje && !mostrarFormulario">{{ mensaje }}</p>
    <p class="error" *ngIf="error && !mostrarFormulario">{{ error }}</p>

    <div *ngIf="maletas.length === 0" class="placeholder">
      No hay maletas registradas
    </div>
    <table *ngIf="maletas.length > 0">
      <tr>
        <th>Reserva ID</th>
        <th>Peso (kg)</th>
        <th>Color</th>
        <th>Costo Adicional</th>
        <th>Acciones</th>
      </tr>
      <tr *ngFor="let m of maletas">
        <td>{{m.reservaId}}</td>
        <td>{{m.peso}}</td>
        <td>{{m.color}}</td>
        <td>{{m.costoAdicional}}</td>
        <td>
          <button class="btn-edit" (click)="abrirEditar(m)">Editar</button>
          <button class="btn-delete" (click)="eliminarMaleta(m.maletaId!)">Eliminar</button>
        </td>
      </tr>
    </table>
  </div>

  <!-- Formulario -->
  <div class="maletas-form" *ngIf="mostrarFormulario">
    <h3>{{ modoEdicion ? 'Editar maleta' : 'Agregar nueva maleta' }}</h3>

    <p class="error" *ngIf="error && mostrarFormulario">{{ error }}</p>

    <form (ngSubmit)="guardar()">
      <label>Reserva ID</label>
      <input type="number" [(ngModel)]="formulario.reservaId" name="reservaId" required />

      <label>Peso (kg)</label>
      <input type="number" [(ngModel)]="formulario.peso" name="peso" required />

      <label>Color</label>
      <input type="text" [(ngModel)]="formulario.color" name="color" required />

      <label>Costo Adicional</label>
      <input type="number" [(ngModel)]="formulario.costoAdicional" name="costoAdicional" required />

      <button type="submit">{{ modoEdicion ? 'Guardar cambios' : 'Agregar Maleta' }}</button>
      <button type="button" class="btn-secondary" (click)="cancelar()">Cancelar</button>
    </form>
  </div>

  <div class="maletas-form-button" *ngIf="!mostrarFormulario">
    <button type="button" (click)="abrirNuevaMaleta()" class="btn-add">+ Agregar nueva maleta</button>
  </div>
</div>
