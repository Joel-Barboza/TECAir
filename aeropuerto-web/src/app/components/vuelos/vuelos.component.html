<div class="vuelos-dashboard">
  <div class="vuelos-table">
    <div class="table-header">
      <h3>Lista de vuelos</h3>
      <button type="button" class="btn-refresh" (click)="cargarVuelos()">&#8635; Actualizar</button>
    </div>
    <div *ngIf="vuelos.length === 0" class="placeholder">
      No hay vuelos registrados
    </div>
    <table *ngIf="vuelos.length > 0">
      <tr>
        <th>Aeropuerto ID</th>
        <th>Avion ID</th>
        <th>Asientos</th>
        <th>Destino</th>
        <th>Salida</th>
        <th>Fecha Salida</th>
        <th>Fecha Llegada</th>
        <th>Acciones</th>
      </tr>
      <tr *ngFor="let v of vuelos">
        <td>{{v.AeropuertoId}}</td>
        <td>{{v.AvionId}}</td>
        <td>{{v.Asientos}}</td>
        <td>{{v.Destino}}</td>
        <td>{{v.Salida}}</td>
        <td>{{v.FechaSalida | date:'short'}}</td>
        <td>{{v.FechaLlegada | date:'short'}}</td>
        <td><button (click)="eliminarVuelo(v.VueloId!)">Eliminar</button></td>
      </tr>
    </table>
  </div>

  <div class="vuelos-form">
    <h3>Agregar nuevo vuelo</h3>
    <form (ngSubmit)="agregarVuelo()">
      <label>Aeropuerto ID</label>
      <input type="number" [(ngModel)]="nuevoVuelo.AeropuertoId" name="aeropuertoId" required />

      <label>Avión ID</label>
      <input type="number" [(ngModel)]="nuevoVuelo.AvionId" name="avionId" required />

      <label>Asientos</label>
      <input type="number" [(ngModel)]="nuevoVuelo.Asientos" name="asientos" required />

      <label>Destino</label>
      <input type="text" [(ngModel)]="nuevoVuelo.Destino" name="destino" required />

      <label>Salida</label>
      <input type="text" [(ngModel)]="nuevoVuelo.Salida" name="salida" required />

      <label>Fecha Salida</label>
      <input type="datetime-local" [(ngModel)]="nuevoVuelo.FechaSalida" name="fechaSalida" required />

      <label>Fecha Llegada</label>
      <input type="datetime-local" [(ngModel)]="nuevoVuelo.FechaLlegada" name="fechaLlegada" required />

      <button type="submit">Agregar vuelo</button>
    </form>
  </div>
</div>
