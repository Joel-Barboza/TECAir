<div class="promociones-dashboard">
  <!-- Tabla de promociones -->
  <div class="promociones-table">
    <h3>Lista de promociones</h3>
    <div *ngIf="promociones.length === 0" class="placeholder">
      No hay promociones registradas
    </div>
    <table *ngIf="promociones.length > 0">
      <tr>
        <th>Vuelo ID</th>
        <th>Origen</th>
        <th>Destino</th>
        <th>Descuento (%)</th>
        <th>Fecha Inicio</th>
        <th>Fecha Fin</th>
        <th>Acciones</th>
      </tr>
      <tr *ngFor="let p of promociones">
        <td>{{p.vueloId}}</td>
        <td>{{p.origen}}</td>
        <td>{{p.destino}}</td>
        <td>{{p.descuento}}</td>
        <td>{{p.fechaInicio | date:'shortDate'}}</td>
        <td>{{p.fechaFin | date:'shortDate'}}</td>
        <td><button (click)="eliminarPromocion(p.promocionId!)">Eliminar</button></td>
      </tr>
    </table>
  </div>

  <!-- Formulario -->
  <div class="promociones-form">
    <h3>Agregar nueva promoción</h3>
    <form (ngSubmit)="agregarPromocion()">
      <label>Vuelo ID</label>
      <input type="number" [(ngModel)]="nuevaPromocion.vueloId" name="vueloId" required />

      <label>Origen</label>
      <input type="text" [(ngModel)]="nuevaPromocion.origen" name="origen" required />

      <label>Destino</label>
      <input type="text" [(ngModel)]="nuevaPromocion.destino" name="destino" required />

      <label>Descuento (%)</label>
      <input type="number" [(ngModel)]="nuevaPromocion.descuento" name="descuento" required />

      <label>Fecha Inicio</label>
      <input type="date" [(ngModel)]="nuevaPromocion.fechaInicio" name="fechaInicio" required />

      <label>Fecha Fin</label>
      <input type="date" [(ngModel)]="nuevaPromocion.fechaFin" name="fechaFin" required />

      <button type="submit">Agregar Promoción</button>
    </form>
  </div>
</div>
