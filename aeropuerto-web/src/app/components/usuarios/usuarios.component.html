<div class="usuarios-dashboard">
  <!-- Tabla de usuarios -->
  <div class="usuarios-table">
    <div class="table-header">
      <h3>Lista de usuarios</h3>
      <button type="button" class="btn-refresh" (click)="cargarUsuarios()">&#8635; Actualizar</button>
    </div>
    <div *ngIf="usuarios.length === 0" class="placeholder">
      No hay usuarios registrados
    </div>
    <table *ngIf="usuarios.length > 0">
      <tr>
        <th>Nombre</th>
        <th>Apellido1</th>
        <th>Apellido2</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Carnet</th>
        <th>Universidad</th>
        <th>Acciones</th>
      </tr>
      <tr *ngFor="let u of usuarios">
        <td>{{u.nombre}}</td>
        <td>{{u.apellido1}}</td>
        <td>{{u.apellido2}}</td>
        <td>{{u.email}}</td>
        <td>{{u.telefono}}</td>
        <td>{{u.carnet}}</td>
        <td>{{u.universidad}}</td>
        <td><button (click)="eliminarUsuario(u.usuarioId!)">Eliminar</button></td>
      </tr>
    </table>
  </div>

  <!-- Formulario -->
  <div class="usuarios-form">
    <h3>Agregar nuevo usuario</h3>
    <form (ngSubmit)="agregarUsuario()">
      <label>Nombre</label>
      <input type="text" [(ngModel)]="nuevoUsuario.nombre" name="nombre" required />

      <label>Apellido1</label>
      <input type="text" [(ngModel)]="nuevoUsuario.apellido1" name="apellido1" required />

      <label>Apellido2</label>
      <input type="text" [(ngModel)]="nuevoUsuario.apellido2" name="apellido2" />

      <label>Email</label>
      <input type="email" [(ngModel)]="nuevoUsuario.email" name="email" required />

      <label>Teléfono</label>
      <input type="text" [(ngModel)]="nuevoUsuario.telefono" name="telefono" required />

      <label>Carnet</label>
      <input type="number" [(ngModel)]="nuevoUsuario.carnet" name="carnet" />

      <label>Universidad</label>
      <input type="text" [(ngModel)]="nuevoUsuario.universidad" name="universidad" />

      <button type="submit">Agregar usuario</button>
    </form>
  </div>
</div>
